<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHS Store</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

    <!-- CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">FHS Store</a>
    </div>
</nav>

<!-- Hero -->
<section class="hero">
    <h1>Fear and Hunger Store</h1>
    <h3>Welcome to a unique experience</h3>
    <p>New catalog and stock</p>
    <p><em>Buy the FEAR… and survive the Hunger</em></p>
</section>

<!-- Produtos -->
<div class="container">
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card">
                <img src="https://via.placeholder.com/300x400" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Ritual Shirt</h5>
                    <p>R$ 79,90</p>
                    <button class="btn btn-dark-custom">Buy</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <img src="https://via.placeholder.com/300x400" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Dungeon Shirt</h5>
                    <p>R$ 89,90</p>
                    <button class="btn btn-dark-custom">Buy</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <img src="https://via.placeholder.com/300x400" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Forgotten One</h5>
                    <p>R$ 84,90</p>
                    <button class="btn btn-dark-custom">Buy</button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Footer -->
<footer>
    <p>© 2026 FHS Store — Not everyone survives.</p>
</footer>
</body>
</html>
