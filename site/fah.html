<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHS Store</title>
    <link rel="icon" type="image/png" href="../site/img/fear_icon.png">

    <!-- Bootstrap, para criar as caixas de cards -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte do site geral -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../site/style.css">
</head>

<body>
<!-- Navbar, propriamente dito, é uma barra de navegação -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
    <div class="logo-gif">
        <img class="logo-gif" src="../site/img/fear-and-hunger-coin-flip.gif" alt="logo-gif">
        <a class="navbar-inicio" id="botao-inflar" href="#">FHS Store</a>
        <a class="navbar-contato" id="botao-inflar" href="../site/contato.html">Contato</a>
        <a class="navbar-catalog" href="catalog-logo"></a>
    </div>
</div>
</nav>

<!-- Hero, class ultilizada no corpo, para deixar em destaque no topo do site -->
<section class="hero">
    <h1>Fear and Hunger Store</h1>
    <h3>Welcome to a unique experience</h3>
    <p>New catalog and stock</p>
    <p><em>Buy the FEAR… and survive the Hunger</em></p>
</section>

<!-- Div dos produtos do site -->
<div class="container">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card">
                <img src="../site/img/ritual_shirt.png" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Ritual Shirt</h5>
                    <div class="Ritual-price-color">
                    <p>R$ 79,90</p>
                    <button class="btn btn-dark-custom">Buy</button>
                </div>
            </div>
        </div>
    </div>
        <div class="col-md-4">
            <div class="card">
                <img src="../site/img/dungeon_shirt.png" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Dungeon Shirt</h5>
                    <div class="Dungeon-price-color">
                    <p>R$ 89,90</p>
                    <button class="btn btn-dark-custom">Buy</button>
                </div>
            </div>
        </div>
    </div>
        <div class="col-md-4">
            <div class="card">
                <img src="../site/img/forgotten_one.png" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Forgotten One</h5>
                    <div class="Forgotten-price-color">
                    <p>R$ 84,90</p>
                    <button class="btn btn-dark-custom">Buy</button>
                </div>
            </div>
        </div>
    </div>
    </div>
</div>

<div class="gif-girl">
    <img src="../site/img/moonles.gif" alt="gif-movel" class="gif-movel">
</div>

<!-- Footer, tag normalmente ultilizada para colocar direitos reservados de uma marca -->
<footer>
    <p>© 2026 FHS Store — Not everyone survives.</p>
    <a href="https://store.steampowered.com/app/1002300/Fear__Hunger/">Jogo Oficial</a>
</footer>
</body>
</html>
